workflows:
  android-v2-release:
    name: CineViet v2 Android Release
    max_build_duration: 90
    instance_type: linux_x2
    environment:
      flutter: stable
      groups:
        - cineviet_android_signing
      vars:
        VERSION_NAME: "2.0.0"
        RELEASE_CHANNEL: "release"
    scripts:
      - name: Flutter clean/get
        script: |
          flutter clean
          flutter pub get
      - name: Analyze and test
        script: |
          timeout 8m flutter analyze --no-pub
          timeout 5m flutter test --no-pub
      - name: Prepare Android signing
        script: |
          set -euo pipefail
          HAS_SIGNING="false"
          if [ -f android/key.properties ]; then
            HAS_SIGNING="true"
            echo "Android signing: android/key.properties found."
          elif [ -n "${CM_KEYSTORE_B64:-}" ] && [ -n "${CM_KEYSTORE_PASSWORD:-}" ] && [ -n "${CM_KEY_ALIAS:-}" ] && [ -n "${CM_KEY_PASSWORD:-}" ]; then
            KEYSTORE_PATH="${CM_BUILD_DIR:-$PWD}/android/cineviet-release.jks"
            KEYSTORE_B64="$(printf '%s' "${CM_KEYSTORE_B64}" | tr -d '\r\n\t ' | sed -e 's/^CM_KEYSTORE_B64=//' -e 's/^"//' -e 's/"$//' -e "s/^'//" -e "s/'$//")"
            if ! printf '%s' "${KEYSTORE_B64}" | base64 --decode > "${KEYSTORE_PATH}"; then
              echo "Android signing: CM_KEYSTORE_B64 is not valid base64. Paste only the raw value from CM_KEYSTORE_B64.txt."
              rm -f "${KEYSTORE_PATH}"
              exit 1
            fi
            if ! keytool -list -keystore "${KEYSTORE_PATH}" -storepass "${CM_KEYSTORE_PASSWORD}" -alias "${CM_KEY_ALIAS}" >/dev/null; then
              echo "Android signing: decoded keystore cannot be opened with CM_KEYSTORE_PASSWORD and CM_KEY_ALIAS."
              echo "Check CM_KEYSTORE_PASSWORD, CM_KEY_ALIAS, and CM_KEY_PASSWORD in the cineviet_android_signing group."
              rm -f "${KEYSTORE_PATH}"
              exit 1
            fi
            SIGNING_CHECK_DIR="$(mktemp -d)"
            mkdir -p "${SIGNING_CHECK_DIR}/payload"
            printf 'cineviet signing check\n' > "${SIGNING_CHECK_DIR}/payload/check.txt"
            jar --create --file "${SIGNING_CHECK_DIR}/unsigned.jar" -C "${SIGNING_CHECK_DIR}/payload" .
            if ! jarsigner -keystore "${KEYSTORE_PATH}" -storepass "${CM_KEYSTORE_PASSWORD}" -keypass "${CM_KEY_PASSWORD}" -signedjar "${SIGNING_CHECK_DIR}/signed.jar" "${SIGNING_CHECK_DIR}/unsigned.jar" "${CM_KEY_ALIAS}" >/dev/null; then
              echo "Android signing: decoded keystore is valid, but CM_KEY_PASSWORD cannot sign with alias CM_KEY_ALIAS."
              echo "Check CM_KEY_PASSWORD for alias ${CM_KEY_ALIAS} in the cineviet_android_signing group."
              rm -rf "${SIGNING_CHECK_DIR}"
              rm -f "${KEYSTORE_PATH}"
              exit 1
            fi
            rm -rf "${SIGNING_CHECK_DIR}"
            chmod 600 "${KEYSTORE_PATH}"
            echo "CM_KEYSTORE_PATH=${KEYSTORE_PATH}" >> "${CM_ENV}"
            HAS_SIGNING="true"
            echo "Android signing: Codemagic base64 keystore decoded."
          elif [ -n "${CM_KEYSTORE_PATH:-}" ] && [ -n "${CM_KEYSTORE_PASSWORD:-}" ] && [ -n "${CM_KEY_ALIAS:-}" ] && [ -n "${CM_KEY_PASSWORD:-}" ]; then
            HAS_SIGNING="true"
            echo "Android signing: Codemagic CM_* signing variables found."
          elif [ -n "${ANDROID_KEYSTORE_PATH:-}" ] && [ -n "${ANDROID_KEYSTORE_PASSWORD:-}" ] && [ -n "${ANDROID_KEY_ALIAS:-}" ] && [ -n "${ANDROID_KEY_PASSWORD:-}" ]; then
            HAS_SIGNING="true"
            echo "Android signing: ANDROID_* signing variables found."
          fi
          if [ "${HAS_SIGNING}" != "true" ]; then
            echo "Android signing: not configured; Gradle will fall back to debug signing."
            if [ "${REQUIRE_ANDROID_SIGNING:-false}" = "true" ]; then
              echo "REQUIRE_ANDROID_SIGNING=true, failing build because signing secrets are missing."
              exit 1
            fi
          fi
      - name: Build mobile/tablet direct APKs
        script: |
          set -euo pipefail
          CV_VERSION_NAME="${VERSION_NAME:-2.0.0}"
          CV_BUILD_NUMBER="${BUILD_NUMBER:-${PROJECT_BUILD_NUMBER:-$(date -u +%Y%m%d%H)}}"
          CV_RELEASE_CHANNEL="${RELEASE_CHANNEL:-release}"
          echo "Building CineViet ${CV_RELEASE_CHANNEL} mobile/tablet ${CV_VERSION_NAME}+${CV_BUILD_NUMBER}"
          flutter build apk --release \
            --target-platform android-arm,android-arm64 \
            --split-per-abi \
            --dart-define=APP_VARIANT=mobile \
            --build-name="${CV_VERSION_NAME}" \
            --build-number="${CV_BUILD_NUMBER}"
      - name: Build Android TV APK
        script: |
          set -euo pipefail
          CV_VERSION_NAME="${VERSION_NAME:-2.0.0}"
          CV_BUILD_NUMBER="${BUILD_NUMBER:-${PROJECT_BUILD_NUMBER:-$(date -u +%Y%m%d%H)}}"
          CV_RELEASE_CHANNEL="${RELEASE_CHANNEL:-release}"
          echo "Building CineViet ${CV_RELEASE_CHANNEL} Android TV ${CV_VERSION_NAME}+${CV_BUILD_NUMBER}"
          flutter build apk --release \
            --dart-define=APP_VARIANT=tv \
            --dart-define=APP_IS_TV=true \
            --build-name="${CV_VERSION_NAME}" \
            --build-number="${CV_BUILD_NUMBER}"
      - name: Collect Android artifacts
        script: |
          set -euo pipefail
          CV_VERSION_NAME="${VERSION_NAME:-2.0.0}"
          CV_BUILD_NUMBER="${BUILD_NUMBER:-${PROJECT_BUILD_NUMBER:-$(date -u +%Y%m%d%H)}}"
          CV_RELEASE_CHANNEL="${RELEASE_CHANNEL:-release}"
          OUT_DIR="build/app/outputs/cineviet-v2-release"
          mkdir -p "${OUT_DIR}"
          cp build/app/outputs/flutter-apk/app-arm64-v8a-release.apk "${OUT_DIR}/CineViet-v2-${CV_RELEASE_CHANNEL}-Mobile-Tablet-arm64-v8a-${CV_VERSION_NAME}+${CV_BUILD_NUMBER}.apk"
          cp build/app/outputs/flutter-apk/app-armeabi-v7a-release.apk "${OUT_DIR}/CineViet-v2-${CV_RELEASE_CHANNEL}-Mobile-Tablet-armeabi-v7a-${CV_VERSION_NAME}+${CV_BUILD_NUMBER}.apk"
          cp build/app/outputs/flutter-apk/app-release.apk "${OUT_DIR}/CineViet-v2-${CV_RELEASE_CHANNEL}-Android-TV-universal-${CV_VERSION_NAME}+${CV_BUILD_NUMBER}.apk"
          {
            echo "app=CineViet v2"
            echo "platform=android"
            echo "channel=${CV_RELEASE_CHANNEL}"
            echo "version=${CV_VERSION_NAME}"
            echo "build_number=${CV_BUILD_NUMBER}"
            echo "workflow=${CM_WORKFLOW_ID:-android-v2-release}"
            echo "commit=${CM_COMMIT:-$(git rev-parse --short HEAD)}"
            echo "branch=${CM_BRANCH:-$(git rev-parse --abbrev-ref HEAD)}"
            echo "built_at_utc=$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          } > "${OUT_DIR}/BUILD_INFO.txt"
          cp release/QA_CHECKLIST.md "${OUT_DIR}/QA_CHECKLIST.md"
          cp release/RELEASE_NOTES_TEMPLATE.md "${OUT_DIR}/RELEASE_NOTES_TEMPLATE.md"
          cp release/ANDROID_SIGNING.md "${OUT_DIR}/ANDROID_SIGNING.md"
          ls -lh "${OUT_DIR}"
    artifacts:
      - build/app/outputs/cineviet-v2-release/*

  ios-v2-release:
    name: CineViet v2 iOS Release
    max_build_duration: 90
    instance_type: mac_mini_m2
    environment:
      flutter: stable
      xcode: latest
      cocoapods: default
      vars:
        VERSION_NAME: "2.0.0"
        RELEASE_CHANNEL: "release"
        BUNDLE_ID: "live.cineviet.cinevietios"
    scripts:
      - name: Flutter clean/get
        script: |
          flutter clean
          flutter pub get
      - name: Analyze and test
        script: |
          flutter analyze
          flutter test
      - name: Install pods
        script: |
          cd ios
          pod install --repo-update
          cd ..
      - name: Build unsigned iOS app
        script: |
          set -euo pipefail
          CV_VERSION_NAME="${VERSION_NAME:-2.0.0}"
          CV_BUILD_NUMBER="${BUILD_NUMBER:-${PROJECT_BUILD_NUMBER:-$(date -u +%Y%m%d%H)}}"
          flutter build ios --release --no-codesign \
            --dart-define=APP_VARIANT=ios \
            --build-name="${CV_VERSION_NAME}" \
            --build-number="${CV_BUILD_NUMBER}"
      - name: Package unsigned IPA
        script: |
          set -euo pipefail
          CV_VERSION_NAME="${VERSION_NAME:-2.0.0}"
          CV_BUILD_NUMBER="${BUILD_NUMBER:-${PROJECT_BUILD_NUMBER:-$(date -u +%Y%m%d%H)}}"
          CV_RELEASE_CHANNEL="${RELEASE_CHANNEL:-release}"
          IPA_DIR="build/ios/unsigned_ipa"
          rm -rf "${IPA_DIR}"
          mkdir -p "${IPA_DIR}/Payload"
          cp -R build/ios/iphoneos/Runner.app "${IPA_DIR}/Payload/"
          cd "${IPA_DIR}"
          zip -yr "CineViet-v2-${CV_RELEASE_CHANNEL}-iOS-unsigned-${CV_VERSION_NAME}+${CV_BUILD_NUMBER}.ipa" Payload
          {
            echo "app=CineViet v2"
            echo "platform=ios"
            echo "channel=${CV_RELEASE_CHANNEL}"
            echo "version=${CV_VERSION_NAME}"
            echo "build_number=${CV_BUILD_NUMBER}"
            echo "workflow=${CM_WORKFLOW_ID:-ios-v2-release}"
            echo "commit=${CM_COMMIT:-$(git rev-parse --short HEAD)}"
            echo "branch=${CM_BRANCH:-$(git rev-parse --abbrev-ref HEAD)}"
            echo "built_at_utc=$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          } > BUILD_INFO.txt
          cp ../../../release/QA_CHECKLIST.md QA_CHECKLIST.md
          cp ../../../release/RELEASE_NOTES_TEMPLATE.md RELEASE_NOTES_TEMPLATE.md
          cp ../../../release/IOS_DISTRIBUTION.md IOS_DISTRIBUTION.md
    artifacts:
      - build/ios/unsigned_ipa/*.ipa
      - build/ios/unsigned_ipa/BUILD_INFO.txt
      - build/ios/unsigned_ipa/*.md
      - build/ios/iphoneos/Runner.app
      - /tmp/xcodebuild_logs/*.log

  windows-v2-release:
    name: CineViet v2 Windows Release
    max_build_duration: 90
    instance_type: windows_x2
    environment:
      flutter: stable
      vars:
        VERSION_NAME: "2.0.0"
        RELEASE_CHANNEL: "release"
    scripts:
      - name: Enable Windows desktop
        script: flutter config --enable-windows-desktop
      - name: Flutter clean/get
        script: |
          flutter clean
          flutter pub get
      - name: Analyze and test
        script: |
          flutter analyze
          flutter test
      - name: Build and package Windows release
        script: |
          $ErrorActionPreference = "Stop"
          $version = if ($env:VERSION_NAME) { $env:VERSION_NAME } else { "2.0.0" }
          $build = if ($env:BUILD_NUMBER) { $env:BUILD_NUMBER } elseif ($env:PROJECT_BUILD_NUMBER) { $env:PROJECT_BUILD_NUMBER } else { Get-Date -Format "yyyyMMddHH" }
          $channel = if ($env:RELEASE_CHANNEL) { $env:RELEASE_CHANNEL } else { "release" }
          $workflow = if ($env:CM_WORKFLOW_ID) { $env:CM_WORKFLOW_ID } else { "windows-v2-release" }
          $commit = if ($env:CM_COMMIT) { $env:CM_COMMIT } else { git rev-parse --short HEAD }
          $branch = if ($env:CM_BRANCH) { $env:CM_BRANCH } else { git rev-parse --abbrev-ref HEAD }
          $zipName = "CineViet-v2-$channel-Windows-$version+$build.zip"
          flutter build windows --release --dart-define=APP_VARIANT=windows --build-name=$version --build-number=$build
          Copy-Item scripts\register_windows_protocol.ps1 build\windows\x64\runner\Release\Register-CineViet-Google-Login.ps1 -Force
          New-Item -ItemType Directory -Force build\windows\package | Out-Null
          @(
            "app=CineViet v2"
            "platform=windows"
            "channel=$channel"
            "version=$version"
            "build_number=$build"
            "workflow=$workflow"
            "commit=$commit"
            "branch=$branch"
            "built_at_utc=$((Get-Date).ToUniversalTime().ToString('yyyy-MM-ddTHH:mm:ssZ'))"
          ) | Set-Content build\windows\x64\runner\Release\BUILD_INFO.txt -Encoding UTF8
          Copy-Item release\QA_CHECKLIST.md build\windows\x64\runner\Release\QA_CHECKLIST.md -Force
          Copy-Item release\RELEASE_NOTES_TEMPLATE.md build\windows\x64\runner\Release\RELEASE_NOTES_TEMPLATE.md -Force
          Compress-Archive -Path build\windows\x64\runner\Release\* -DestinationPath "build\windows\package\$zipName" -Force
    artifacts:
      - build/windows/package/*.zip
      - build/windows/x64/runner/Release/**
